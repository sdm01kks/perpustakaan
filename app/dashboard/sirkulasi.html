<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sirkulasi — Perpustakaan SDM01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js"></script>
<link rel="stylesheet" href="../../assets/design.css">
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
.circ-header {
  position:sticky; top:0; z-index:50;
  background:#fff; border-bottom:1px solid var(--border);
  padding:0; display:flex;
}
.circ-tab {
  flex:1; padding:16px; font-family:inherit; font-size:14px; font-weight:600;
  cursor:pointer; border:none; background:none; transition:all .2s;
  color:var(--ink-muted); border-bottom:3px solid transparent;
}
.circ-tab.active { color:var(--green-dark); border-bottom-color:var(--green-dark); }
.circ-form { padding:24px; display:none; }
.circ-form.active { display:block; }

.found-card {
  background:var(--green-ghost); border:1px solid rgba(30,77,59,.15);
  border-radius:10px; padding:14px 16px;
  display:flex; align-items:center; gap:12px; margin-top:10px;
}
.found-card.not-available { background:var(--red-light); border-color:rgba(192,57,43,.2); }
.found-avatar { width:40px;height:40px;border-radius:50%;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
.found-name { font-weight:700;font-size:13px;color:var(--ink); }
.found-meta { font-size:11.5px;color:var(--ink-muted);margin-top:2px; }

.loan-confirm {
  border:1px solid var(--border); border-radius:10px;
  padding:16px; margin-top:16px; background:#fff;
  display:none;
}
.loan-confirm.visible { display:block; }

.active-loan-card {
  border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:10px; background:#fff;
  display:flex; justify-content:space-between; align-items:center; gap:10px;
}
.active-loan-card.overdue { background:#fff8f8; border-color:rgba(192,57,43,.2); }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-lg"></div>
  <p>Memuat modul sirkulasi…</p>
</div>

<!-- Topbar -->
<header class="topbar">
  <a class="topbar-logo" href="pustakawan.html">
    <img src="../../assets/logo.jpeg" alt="Logo SDM01">
    <div>
      <div class="brand-name">SDM01 Kukusan</div>
      <div class="brand-sub">Perpustakaan Digital</div>
    </div>
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-title">🔄 Sirkulasi</div>
  <div class="topbar-right">
    <a href="pustakawan.html" class="btn-logout" style="text-decoration:none">← Dashboard</a>
  </div>
</header>

<div style="height:var(--topbar-h)"></div>

<div style="max-width:860px;margin:0 auto;padding:24px 16px 60px">

  <!-- Tab navigation -->
  <div class="card" style="margin-bottom:20px;overflow:visible">
    <div class="circ-header">
      <button class="circ-tab active" id="tab-pinjam" onclick="showTab('pinjam')">📤 Peminjaman Buku</button>
      <button class="circ-tab" id="tab-kembali" onclick="showTab('kembali')">📥 Pengembalian Buku</button>
    </div>

    <!-- ── FORM PEMINJAMAN ──────────────────────────── -->
    <div class="circ-form active" id="form-pinjam">
      <div class="section-title">Cari Anggota & Buku</div>
      <div class="form-row" style="margin-bottom:0">
        <!-- Cari anggota -->
        <div>
          <div class="form-group">
            <label class="form-label">NIS atau Nama Anggota</label>
            <div style="display:flex;gap:8px">
              <input type="text" id="search-member" class="form-input" placeholder="Ketik NIS atau nama…" style="margin-bottom:0" onkeypress="if(event.key==='Enter')searchMember()">
              <button class="btn btn-primary" onclick="searchMember()">Cari</button>
            </div>
          </div>
          <div id="member-result"></div>
        </div>

        <!-- Cari buku -->
        <div>
          <div class="form-group">
            <label class="form-label">Kode Aksesi atau Judul Buku</label>
            <div style="display:flex;gap:8px">
              <input type="text" id="search-book" class="form-input" placeholder="Ketik kode atau judul…" style="margin-bottom:0" onkeypress="if(event.key==='Enter')searchBookForLoan()">
              <button class="btn btn-primary" onclick="searchBookForLoan()">Cari</button>
            </div>
          </div>
          <div id="book-result"></div>
        </div>
      </div>

      <!-- Konfirmasi peminjaman -->
      <div class="loan-confirm" id="loan-details">
        <div class="section-title">Konfirmasi Peminjaman</div>
        <div style="background:var(--green-pale);border:1px solid rgba(30,77,59,.15);border-radius:10px;padding:14px 16px;margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:12px;color:var(--ink-muted)">Anggota:</span>
            <span style="font-size:13px;font-weight:700" id="loan-member-name">—</span>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:12px;color:var(--ink-muted)">Buku:</span>
            <span style="font-size:13px;font-weight:700" id="loan-book-title">—</span>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Tanggal Pinjam</label>
            <input type="date" id="loan-date" class="form-input" readonly style="background:#f5f5f5">
          </div>
          <div class="form-group">
            <label class="form-label">Jatuh Tempo</label>
            <input type="date" id="due-date" class="form-input">
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" style="flex:1" onclick="processLoan()">✅ Proses Peminjaman</button>
          <button class="btn btn-ghost" onclick="resetLoanForm()">Reset</button>
        </div>
      </div>

      <!-- Daftar peminjaman aktif -->
      <div style="margin-top:24px">
        <div class="section-title">Peminjaman Aktif</div>
        <div id="active-loans">
          <div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Tidak ada peminjaman aktif</div></div>
        </div>
      </div>
    </div>

    <!-- ── FORM PENGEMBALIAN ────────────────────────── -->
    <div class="circ-form" id="form-kembali">
      <div class="section-title">Cari Peminjaman</div>
      <div class="form-group">
        <label class="form-label">NIS Peminjam atau Kode Buku</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="search-loan" class="form-input" placeholder="Ketik NIS atau kode aksesi…" style="margin-bottom:0" onkeypress="if(event.key==='Enter')searchActiveLoan()">
          <button class="btn btn-primary" onclick="searchActiveLoan()">Cari</button>
        </div>
      </div>
      <div id="return-details"></div>
    </div>
  </div>

</div>

<script src="../core/db.js"></script>
<script src="../core/auth.js"></script>
<script>
  let selectedMember = null;
  let selectedBook   = null;
  let selectedLoan   = null;

  document.addEventListener('DOMContentLoaded', async function() {
    await waitForLibraries();
    await dbManager.init();
    const isLoggedIn = await authManager.init();
    if (!isLoggedIn) { window.location.href = '../../index.html'; return; }

    const today = new Date();
    document.getElementById('loan-date').valueAsDate = today;
    const due = new Date(); due.setDate(due.getDate() + 7);
    document.getElementById('due-date').valueAsDate = due;
    document.getElementById('loadingOverlay').classList.add('hidden');

    await loadActiveLoans();
  });

  function showTab(tab) {
    document.getElementById('tab-pinjam').className  = 'circ-tab' + (tab==='pinjam'?' active':'');
    document.getElementById('tab-kembali').className = 'circ-tab' + (tab==='kembali'?' active':'');
    document.getElementById('form-pinjam').className  = 'circ-form' + (tab==='pinjam'?' active':'');
    document.getElementById('form-kembali').className = 'circ-form' + (tab==='kembali'?' active':'');
  }

  async function searchMember() {
    const q = document.getElementById('search-member').value.trim();
    if (!q) return;
    try {
      let member = await dbManager.db.members.where('nis').equals(q).first();
      if (!member) {
        const all = await dbManager.db.members.toArray();
        member = all.find(m => m.nama_lengkap.toLowerCase().includes(q.toLowerCase()));
      }
      const div = document.getElementById('member-result');
      if (member) {
        selectedMember = member;
        div.innerHTML = `<div class="found-card">
          <div class="found-avatar">👤</div>
          <div><div class="found-name">${member.nama_lengkap}</div>
          <div class="found-meta">NIS: ${member.nis} · Kelas: ${member.kelas||'—'}</div></div>
          <span class="badge green" style="margin-left:auto">✓ Ditemukan</span>
        </div>`;
        checkLoanReady();
      } else {
        selectedMember = null;
        div.innerHTML = '<div class="found-card not-available"><div class="found-avatar">❌</div><div><div class="found-name">Anggota tidak ditemukan</div></div></div>';
      }
    } catch(e) { alert('Gagal mencari: ' + e.message); }
  }

  async function searchBookForLoan() {
    const q = document.getElementById('search-book').value.trim();
    if (!q) return;
    try {
      let book = await dbManager.db.books.where('kode_aksesi').equals(q).first();
      if (!book) {
        const all = await dbManager.db.books.toArray();
        book = all.find(b => b.judul.toLowerCase().includes(q.toLowerCase()) && b.status === 'tersedia');
      }
      const div = document.getElementById('book-result');
      if (book) {
        if (book.status !== 'tersedia') {
          selectedBook = null;
          div.innerHTML = `<div class="found-card not-available"><div class="found-avatar">📚</div><div><div class="found-name">${book.judul}</div><div class="found-meta">Status: ${book.status} — tidak bisa dipinjam</div></div></div>`;
          return;
        }
        selectedBook = book;
        div.innerHTML = `<div class="found-card">
          <div class="found-avatar">📚</div>
          <div><div class="found-name">${book.judul}</div>
          <div class="found-meta">${book.pengarang} · ${book.kode_aksesi}</div></div>
          <span class="badge green" style="margin-left:auto">✓ Tersedia</span>
        </div>`;
        checkLoanReady();
      } else {
        selectedBook = null;
        div.innerHTML = '<div class="found-card not-available"><div class="found-avatar">📚</div><div><div class="found-name">Buku tidak ditemukan atau tidak tersedia</div></div></div>';
      }
    } catch(e) { alert('Gagal mencari: ' + e.message); }
  }

  function checkLoanReady() {
    const detail = document.getElementById('loan-details');
    if (selectedMember && selectedBook) {
      detail.classList.add('visible');
      document.getElementById('loan-member-name').textContent = selectedMember.nama_lengkap;
      document.getElementById('loan-book-title').textContent  = selectedBook.judul;
    }
  }

  async function processLoan() {
    if (!selectedMember || !selectedBook) { alert('Pilih anggota dan buku terlebih dahulu'); return; }
    const dueDate = document.getElementById('due-date').value;
    if (!dueDate) { alert('Pilih tanggal jatuh tempo'); return; }
    try {
      const activeLoans = await dbManager.db.circulation.where('member_id').equals(selectedMember.id).and(l => l.status === 'dipinjam').count();
      if (activeLoans >= 2) { alert('Anggota sudah meminjam maksimal 2 buku'); return; }
      const result = await dbManager.borrowBook(selectedBook.id, selectedMember.id, 7);
      if (result.success) {
        showToast('✅ ' + result.message, 'success');
        resetLoanForm();
        await loadActiveLoans();
      } else { alert('❌ ' + result.error); }
    } catch(e) { alert('Gagal memproses: ' + e.message); }
  }

  function resetLoanForm() {
    selectedMember = null; selectedBook = null;
    document.getElementById('search-member').value = '';
    document.getElementById('search-book').value   = '';
    document.getElementById('member-result').innerHTML = '';
    document.getElementById('book-result').innerHTML   = '';
    document.getElementById('loan-details').classList.remove('visible');
  }

  async function loadActiveLoans() {
    const container = document.getElementById('active-loans');
    try {
      const loans = await dbManager.db.circulation.where('status').equals('dipinjam').reverse().limit(20).toArray();
      if (loans.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Tidak ada peminjaman aktif</div></div>';
        return;
      }
      const details = await Promise.all(loans.map(async l => {
        const [book, member] = await Promise.all([dbManager.db.books.get(l.book_id), dbManager.db.members.get(l.member_id)]);
        return { ...l, book, member };
      }));
      container.innerHTML = details.map(item => {
        const due = new Date(item.due_date);
        const isOverdue = due < new Date();
        const diffDays = Math.ceil((due - new Date()) / 86400000);
        return `<div class="active-loan-card ${isOverdue?'overdue':''}">
          <div>
            <div style="font-size:13px;font-weight:700;color:var(--ink)">${item.book?.judul||'—'}</div>
            <div style="font-size:11.5px;color:var(--ink-muted);margin-top:2px">${item.member?.nama_lengkap||'—'} · ${item.member?.kelas||'—'}</div>
            <div style="font-size:11px;color:var(--ink-muted);margin-top:2px">Dipinjam: ${new Date(item.borrow_date).toLocaleDateString('id-ID')}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            ${isOverdue ? `<span class="badge red">⚠️ Terlambat ${Math.abs(diffDays)} hari</span>` : `<span class="badge green">⏳ ${diffDays} hari lagi</span>`}
            <div style="font-size:11px;color:var(--ink-muted);margin-top:4px">Jatuh tempo: ${due.toLocaleDateString('id-ID')}</div>
          </div>
        </div>`;
      }).join('');
    } catch(e) { console.error('Load loans error:', e); }
  }

  async function searchActiveLoan() {
    const q = document.getElementById('search-loan').value.trim();
    if (!q) return;
    try {
      const allLoans = await dbManager.db.circulation.where('status').equals('dipinjam').toArray();
      let found = null;
      for (const l of allLoans) {
        const member = await dbManager.db.members.get(l.member_id);
        const book   = await dbManager.db.books.get(l.book_id);
        if (member?.nis === q || book?.kode_aksesi === q) { found = { ...l, member, book }; break; }
      }
      const div = document.getElementById('return-details');
      if (!found) { div.innerHTML = '<div class="found-card not-available"><div class="found-avatar">❌</div><div><div class="found-name">Peminjaman tidak ditemukan</div></div></div>'; return; }

      selectedLoan = found;
      const dueDate = new Date(found.due_date);
      const diffDays = Math.ceil((new Date() - dueDate) / 86400000);
      const denda = diffDays > 1 ? Math.min((diffDays-1)*1000, 10000) : 0;

      div.innerHTML = `<div class="card" style="margin-top:14px">
        <div class="card-header"><span class="card-title">📥 Detail Pengembalian</span></div>
        <div class="card-body">
          <div style="background:var(--green-pale);border:1px solid rgba(30,77,59,.15);border-radius:10px;padding:14px;margin-bottom:14px">
            <div style="font-size:13px;font-weight:700;margin-bottom:6px">${found.book.judul}</div>
            <div style="font-size:12px;color:var(--ink-muted)">Peminjam: ${found.member.nama_lengkap}</div>
            <div style="font-size:12px;color:var(--ink-muted)">Dipinjam: ${new Date(found.borrow_date).toLocaleDateString('id-ID')}</div>
            <div style="font-size:12px;color:var(--ink-muted)">Jatuh tempo: ${dueDate.toLocaleDateString('id-ID')}</div>
          </div>
          ${denda > 0 ? `<div class="alert error" style="margin-bottom:14px">
            <div class="alert-icon">⚠️</div>
            <div class="alert-body"><div class="alert-title">Denda Keterlambatan</div>
            <div class="alert-text">Rp ${denda.toLocaleString('id-ID')} (${diffDays-1} hari × Rp 1.000)</div></div>
          </div>` : `<div class="alert success" style="margin-bottom:14px">
            <div class="alert-icon">✅</div>
            <div class="alert-body"><div class="alert-title">Tepat Waktu</div><div class="alert-text">Tidak ada denda</div></div>
          </div>`}
          <div class="form-group">
            <label class="form-label">Kondisi Buku Saat Dikembalikan</label>
            <select id="return-condition" class="form-select">
              <option value="baik">Baik — Tidak ada kerusakan</option>
              <option value="rusak_ringan">Rusak Ringan — Masih bisa dipakai</option>
              <option value="rusak">Rusak Berat — Perlu perbaikan</option>
              <option value="hilang">Hilang</option>
            </select>
          </div>
          <button onclick="processReturn()" class="btn btn-primary btn-full btn-lg">✅ Proses Pengembalian</button>
        </div>
      </div>`;
    } catch(e) { alert('Gagal mencari: ' + e.message); }
  }

  async function processReturn() {
    if (!selectedLoan) return;
    const condition = document.getElementById('return-condition').value;
    try {
      const result = await dbManager.returnBook(selectedLoan.id, condition);
      if (result.success) {
        showToast('✅ ' + result.message, 'success');
        selectedLoan = null;
        document.getElementById('search-loan').value = '';
        document.getElementById('return-details').innerHTML = '';
        await loadActiveLoans();
      } else { alert('❌ ' + result.error); }
    } catch(e) { alert('Gagal memproses: ' + e.message); }
  }

  function showToast(msg, type='') {
    const el = document.createElement('div');
    el.className = 'toast' + (type?' '+type:'');
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  function waitForLibraries() {
    return new Promise(res => {
      const c = () => (typeof Dexie!=='undefined'&&typeof dbManager!=='undefined')?res():setTimeout(c,100);
      c();
    });
  }
</script>
</body>
</html>
