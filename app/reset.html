<!DOCTYPE html>
<html>
<head>
    <title>Reset Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-red-50 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md text-center">
        <div class="text-6xl mb-4">⚠️</div>
        <h1 class="text-2xl font-bold text-red-600 mb-4">Reset Database</h1>
        <p class="text-gray-600 mb-6">
            Ini akan menghapus SEMUA data lokal dan mengembalikan ke pengaturan awal.
            Data di Google Drive (jika sudah sync) tidak terpengaruh.
        </p>
        
        <button onclick="resetDB()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg mb-4">
            YA, Reset Database
        </button>
        
        <a href="../index.html" class="block text-blue-600 hover:text-blue-800">
            Batal, Kembali ke Login
        </a>
        
        <div id="status" class="mt-4 text-sm"></div>
    </div>

    <script>
        function resetDB() {
            // Hapus semua database IndexedDB
            const req = indexedDB.deleteDatabase('PerpustakaanSDM01');
            
            req.onsuccess = function() {
                // Hapus localStorage
                localStorage.clear();
                
                document.getElementById('status').innerHTML = 
                    '<div class="text-green-600 font-bold">✅ Database berhasil direset!</div>' +
                    '<div class="mt-2"><a href="../index.html" class="text-blue-600 underline">Klik di sini untuk setup ulang</a></div>';
            };
            
            req.onerror = function() {
                document.getElementById('status').innerHTML = 
                    '<div class="text-red-600">❌ Gagal reset. Coba tutup tab lain dan refresh.</div>';
            };
        }
    </script>
</body>
</html>
