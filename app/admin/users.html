<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manajemen User — Perpustakaan SDM01</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/3.2.4/dexie.min.js"></script>
<link rel="stylesheet" href="../../assets/design.css">
<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner-lg"></div>
  <p>Memuat data user…</p>
</div>

<header class="topbar">
  <a class="topbar-logo" href="../dashboard/pustakawan.html">
    <img src="../../assets/logo.jpeg" alt="Logo SDM01">
    <div>
      <div class="brand-name">SDM01 Kukusan</div>
      <div class="brand-sub">Perpustakaan Digital</div>
    </div>
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-title">⚙️ Manajemen User</div>
  <div class="topbar-right">
    <a href="../dashboard/pustakawan.html" class="btn-logout" style="text-decoration:none">← Dashboard</a>
  </div>
</header>

<main class="main" style="margin-left:0;max-width:900px;margin-right:auto">
  <div class="page-header animate-up">
    <h1>Manajemen User</h1>
    <p>Data user dikelola melalui Google Sheets dan langsung aktif di semua perangkat.</p>
  </div>

  <!-- Alert area -->
  <div id="alert-area"></div>

  <div class="card animate-up-d1">
    <div class="card-header">
      <span class="card-title">👤 Daftar User Terdaftar</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="loadUsers()">🔄 Refresh</button>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('panel-add').classList.toggle('hidden')">+ Tambah User</button>
      </div>
    </div>

    <!-- Add user panel -->
    <div id="panel-add" class="hidden" style="padding:16px;background:var(--green-ghost);border-bottom:1px solid var(--border)">
      <p style="font-size:12px;font-weight:700;color:var(--green-dark);margin-bottom:12px">Tambah User Baru</p>
      <div class="form-row">
        <div>
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="add-nama" class="form-input" placeholder="Nama Lengkap">
        </div>
        <div>
          <label class="form-label">Email</label>
          <input type="email" id="add-email" class="form-input" placeholder="email@sekolah.com">
        </div>
        <div>
          <label class="form-label">Role</label>
          <select id="add-role" class="form-select">
            <option value="pustakawan">Pustakawan</option>
            <option value="admin">Admin</option>
            <option value="guru">Guru</option>
            <option value="siswa">Siswa</option>
          </select>
        </div>
        <div>
          <label class="form-label">PIN (6 digit)</label>
          <input type="tel" id="add-pin" class="form-input" placeholder="123456" maxlength="6" pattern="\d{6}">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="btn btn-primary btn-sm" onclick="addUser()">💾 Simpan</button>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('panel-add').classList.add('hidden')">Batal</button>
      </div>
    </div>

    <!-- Search -->
    <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
      <input type="text" id="search-users" class="form-input" style="margin-bottom:0" placeholder="Cari nama atau email…" oninput="filterUsers()">
    </div>

    <!-- User table -->
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nama</th>
            <th>Email</th>
            <th>Role</th>
            <th>PIN</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--ink-muted)">Memuat…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Edit modal -->
<div class="modal-backdrop hidden" id="modal-edit">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ Edit User</div>
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-orig-email">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="edit-nama" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="edit-email" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="edit-role" class="form-select">
            <option value="superadmin">Superadmin</option>
            <option value="admin">Admin</option>
            <option value="pustakawan">Pustakawan</option>
            <option value="guru">Guru</option>
            <option value="siswa">Siswa</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">PIN Baru (kosong = tidak diubah)</label>
          <input type="tel" id="edit-pin" class="form-input" placeholder="6 digit angka" maxlength="6">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" id="edit-active" style="width:16px;height:16px;accent-color:var(--green-dark)">
          <span>Akun Aktif</span>
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteUser()">🗑 Hapus</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeEdit()">Batal</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Simpan</button>
    </div>
  </div>
</div>

<script src="../core/db.js"></script>
<script src="../core/sheets-config.js"></script>
<script src="../core/drive-config.js"></script>
<script src="../core/auth.js"></script>
<script>
let allUsers = [];

document.addEventListener('DOMContentLoaded', async () => {
  await waitForDexie();
  await dbManager.init();
  const ok = await authManager.init();
  if (!ok) { window.location.replace('../../index.html'); return; }
  const u = authManager.getCurrentUser();
  if (!u || (u.role !== 'superadmin' && u.role !== 'admin')) {
    window.location.replace('../dashboard/pustakawan.html'); return;
  }
  document.getElementById('loadingOverlay').classList.add('hidden');
  await loadUsers();
});

async function loadUsers() {
  document.getElementById('users-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--ink-muted)">Memuat dari Google Sheets…</td></tr>';
  try {
    allUsers = await sheetsManager.fetchUsers();
    await dbManager.db.users.clear();
    if (allUsers.length > 0) await dbManager.db.users.bulkAdd(allUsers);
    renderUsers(allUsers);
  } catch(e) {
    showAlert('error', 'Gagal memuat: ' + e.message);
    document.getElementById('users-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--red)">Gagal memuat data. Pastikan koneksi internet aktif.</td></tr>';
  }
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('users-tbody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--ink-muted)">Belum ada user terdaftar di Google Sheets.</td></tr>';
    return;
  }
  const roleColors = { superadmin:'purple', admin:'blue', pustakawan:'green', guru:'gold', siswa:'gray' };
  document.getElementById('users-tbody').innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--green-pale);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--green-dark);flex-shrink:0">${u.nama.charAt(0).toUpperCase()}</div>
          <span style="font-weight:600">${u.nama}</span>
        </div>
      </td>
      <td style="color:var(--ink-muted)">${u.email}</td>
      <td><span class="badge ${roleColors[u.role]||'gray'}">${u.role}</span></td>
      <td><code style="font-size:11.5px;background:#f0efed;padding:2px 7px;border-radius:5px">${u.pin ? '••••••' : '—'}</code></td>
      <td><span class="badge ${u.is_active?'green':'red'}">${u.is_active?'Aktif':'Nonaktif'}</span></td>
      <td><button onclick="openEdit('${u.email}')" class="btn btn-ghost btn-sm">✏️ Edit</button></td>
    </tr>`).join('');
}

function filterUsers() {
  const q = document.getElementById('search-users').value.toLowerCase();
  renderUsers(q ? allUsers.filter(u => u.nama.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) : allUsers);
}

function openEdit(email) {
  const u = allUsers.find(x => x.email === email);
  if (!u) return;
  document.getElementById('edit-orig-email').value = u.email;
  document.getElementById('edit-nama').value  = u.nama;
  document.getElementById('edit-email').value = u.email;
  document.getElementById('edit-role').value  = u.role;
  document.getElementById('edit-pin').value   = '';
  document.getElementById('edit-active').checked = u.is_active;
  document.getElementById('modal-edit').classList.remove('hidden');
}
function closeEdit() { document.getElementById('modal-edit').classList.add('hidden'); }

async function saveEdit() {
  const orig  = document.getElementById('edit-orig-email').value;
  const nama  = document.getElementById('edit-nama').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const role  = document.getElementById('edit-role').value;
  const pin   = document.getElementById('edit-pin').value.trim();
  const active= document.getElementById('edit-active').checked;
  if (!nama || !email) { alert('Nama dan email wajib diisi'); return; }
  if (pin && !/^\d{6}$/.test(pin)) { alert('PIN harus 6 digit angka'); return; }
  try {
    await ensureConnected();
    const users = await sheetsManager.fetchUsers();
    const idx = users.findIndex(u => u.email === orig);
    if (idx === -1) { alert('User tidak ditemukan'); return; }
    users[idx] = { ...users[idx], nama, email, role, is_active: active, ...(pin ? { pin } : {}) };
    await sheetsManager.writeUsers(users);
    closeEdit();
    showAlert('success', `✅ User "${nama}" berhasil diperbarui`);
    await loadUsers();
  } catch(e) { alert('Gagal: ' + e.message); }
}

async function deleteUser() {
  const email = document.getElementById('edit-orig-email').value;
  const u = allUsers.find(x => x.email === email);
  if (!u) return;
  if (!confirm(`Hapus user "${u.nama}"?\n\nTindakan ini tidak bisa dibatalkan.`)) return;
  if (u.role === 'superadmin') { alert('Superadmin tidak bisa dihapus.'); return; }
  try {
    await ensureConnected();
    const filtered = allUsers.filter(x => x.email !== email);
    await sheetsManager.writeUsers(filtered);
    closeEdit();
    showAlert('success', `✅ User "${u.nama}" berhasil dihapus`);
    await loadUsers();
  } catch(e) { alert('Gagal: ' + e.message); }
}

async function addUser() {
  const nama  = document.getElementById('add-nama').value.trim();
  const email = document.getElementById('add-email').value.trim();
  const role  = document.getElementById('add-role').value;
  const pin   = document.getElementById('add-pin').value.trim();
  if (!nama || !email || !pin) { alert('Semua field wajib diisi'); return; }
  if (!/^\d{6}$/.test(pin)) { alert('PIN harus 6 digit angka'); return; }
  try {
    await ensureConnected();
    const existing = await sheetsManager.fetchUsers();
    if (existing.find(u => u.email === email)) { alert('Email sudah terdaftar'); return; }
    const newId = existing.length > 0 ? Math.max(...existing.map(u => u.id)) + 1 : 1;
    await sheetsManager.appendUser({ id: newId, email, nama, role, pin, is_active: true });
    ['add-nama','add-email','add-pin'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('panel-add').classList.add('hidden');
    showAlert('success', `✅ User "${nama}" berhasil ditambahkan`);
    await loadUsers();
  } catch(e) { alert('Gagal: ' + e.message); }
}

async function ensureConnected() {
  if (sheetsManager.isConnected()) return;
  await sheetsManager.connect();
}

function showAlert(type, msg) {
  const el = document.getElementById('alert-area');
  const icon = type === 'success' ? '✅' : '⛔';
  el.innerHTML = `<div class="alert ${type === 'success' ? 'success' : 'error'}" style="margin-bottom:16px">
    <div class="alert-icon">${icon}</div>
    <div class="alert-body"><div class="alert-text">${msg}</div></div>
  </div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

function waitForDexie() {
  return new Promise((res, rej) => {
    const t = Date.now();
    const c = () => typeof Dexie !== 'undefined' ? res() : Date.now()-t > 10000 ? rej(new Error('Timeout')) : setTimeout(c, 100);
    c();
  });
}
</script>
</body>
</html>
